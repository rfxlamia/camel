name: camel-kanban-prod

services:
  db:
    image: postgres:16-alpine
    container_name: camel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: camel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: camel_kanban
    volumes:
      - camel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camel -d camel_kanban"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: camel-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: camel-server:latest
    container_name: camel-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://camel:${DB_PASSWORD}@db:5432/camel_kanban
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      CORS_ORIGIN: https://camel.web.id
      APP_BASE_URL: https://api.camel.web.id
      CLIENT_URL: https://camel.web.id
      PORT: 3001
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OAUTH_ENABLED: ${OAUTH_ENABLED:-false}
      EMAIL_GATE_ENABLED: ${EMAIL_GATE_ENABLED:-false}
    volumes:
      - camel_uploads:/app/client/public/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  camel_pgdata:
  camel_uploads:
