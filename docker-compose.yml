services:
  db:
    image: postgres:16-alpine
    container_name: camel-kanban-db
    environment:
      POSTGRES_USER: camel
      POSTGRES_PASSWORD: camel
      POSTGRES_DB: camel_kanban
    ports:
      - "5432:5432"
    volumes:
      - camel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camel -d camel_kanban"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  camel_pgdata:
